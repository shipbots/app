<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ShipBots Customer Service</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="header">
    <img src="icons/icon-48.png" alt="ShipBots" width="28" height="28" />
    <div>
      <p class="title">ShipBots</p>
      <p class="subtitle">Customer Service</p>
    </div>
  </header>

  <main class="body">
    <p class="hint">Search a client to open their full info panel:</p>
    <form id="search-form" class="search-form">
      <input
        id="search-input"
        type="search"
        placeholder="iMusti, Alvara, Terra…"
        autocomplete="off"
        autofocus
      />
      <button type="submit" aria-label="Search">→</button>
    </form>

    <div id="search-status" class="search-status" hidden></div>
    <ul id="search-results" class="search-results" role="listbox" hidden></ul>

    <div class="actions">
      <button id="open-calendar" class="action-btn">
        <span class="action-icon" aria-hidden="true">📅</span>
        <span>
          <span class="action-label">Calendar</span>
          <span class="action-desc">Upcoming kickoffs &amp; deliveries</span>
        </span>
      </button>
      <button id="open-tasks" class="action-btn">
        <span class="action-icon" aria-hidden="true">✅</span>
        <span>
          <span class="action-label">Tasks</span>
          <span class="action-desc">Open work across all clients</span>
        </span>
      </button>
    </div>

    <div class="section-label">
      <span>Mini Apps</span>
      <button type="button" id="open-all-apps" class="section-link">Open in dashboard →</button>
    </div>
    <div class="mini-apps-grid">
      <button class="tile" data-app="csv-order-formatter" title="Reshape any CSV/Excel into the ShipHero order upload template. Opens in the dashboard.">
        <span class="tile-icon" aria-hidden="true">📊</span>
        <span class="tile-label">CSV Order<br/>Formatter</span>
      </button>
      <button class="tile" data-app="sheet" title="Opens the ShipBots Sheet workspace.">
        <span class="tile-icon" aria-hidden="true">📗</span>
        <span class="tile-label">SHEET</span>
      </button>
      <button class="tile" data-app="ship-hero" title="Opens the ShipHero login.">
        <span class="tile-icon" aria-hidden="true">🚢</span>
        <span class="tile-label">Ship Hero</span>
      </button>
      <button class="tile" data-app="sh-portal" title="Opens the ShipBots 3PL portal.">
        <span class="tile-icon" aria-hidden="true">📦</span>
        <span class="tile-label">SH Portal</span>
      </button>
      <button class="tile" data-app="help-shiphero" title="How-to articles for AppDot clients.">
        <span class="tile-icon" aria-hidden="true">🆘</span>
        <span class="tile-label">Help<br/>Shiphero</span>
      </button>
      <button class="tile" data-app="help-portal" title="How-to articles for Portal clients.">
        <span class="tile-icon" aria-hidden="true">📖</span>
        <span class="tile-label">Help Portal</span>
      </button>
    </div>

    <p class="settings-link">
      <span id="base-url-label">Connected to <span id="base-url"></span></span>
      <button id="edit-url" type="button">Change…</button>
    </p>

    <form id="url-form" class="url-form" hidden>
      <input id="url-input" type="url" placeholder="https://your-deploy.vercel.app" />
      <button type="submit">Save</button>
      <button type="button" id="url-cancel">Cancel</button>
    </form>
  </main>

  <script src="popup.js"></script>
</body>
</html>
